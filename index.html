        // 搜索函数
        function search() {
            const category = document.getElementById('category').value;
            const budget = document.getElementById('budget').value;
            const event = document.getElementById('event').value;
            const details = document.getElementById('details').value.toLowerCase();
            
            if (!category && !details && !event) {
                alert('請至少選擇一個需求類別或填寫詳細說明');
                return;
            }
            
            // 匹配算法
            let results = socialEnterprises.map(se => {
                let score = 0;
                let matchedReasons = [];
                
                // 类别匹配
                if (category && se.categories.includes(category)) {
                    score += 30;
                    matchedReasons.push(`類別匹配: ${category}`);
                }
                
                // 活动类型匹配
                const eventKeywords = {
                    '節慶': ['禮品', '節慶', '中秋', '新年', '月餅', '曲奇'],
                    '團隊': ['工作坊', '培訓', '團隊', '活動'],
                    '家庭': ['家庭', '兒童', '親子'],
                    '志願': ['志願', '服務', '捐贈', '公益'],
                    '培訓': ['培訓', '工作坊', '課程'],
                    '採購': ['禮品', '採購', '零售']
                };
                
                if (event && eventKeywords[event]) {
                    const keywords = eventKeywords[event];
                    const hasMatch = se.keywords.some(k => keywords.includes(k)) || 
                                    se.products.some(p => keywords.some(k => p.includes(k)));
                    if (hasMatch) {
                        score += 20;
                        matchedReasons.push(`活動類型匹配: ${event}`);
                    }
                }
                
                // 关键词匹配（详细说明）
                if (details) {
                    const detailWords = details.split(/[\s,，。、]+/).filter(w => w.length > 1);
                    let keywordMatches = 0;
                    
                    detailWords.forEach(word => {
                        if (se.keywords.some(k => k.includes(word))) keywordMatches++;
                        if (se.products.some(p => p.includes(word))) keywordMatches++;
                        if (se.mission.includes(word)) keywordMatches++;
                    });
                    
                    if (keywordMatches > 0) {
                        score += Math.min(keywordMatches * 10, 40);
                        matchedReasons.push(`關鍵詞匹配`);
                    }
                }
                
                // 特殊关键词加分
                const boostKeywords = ['ESG', 'CSR', '企業', '員工', '活動', '培訓'];
                boostKeywords.forEach(k => {
                    if (details.includes(k.toLowerCase()) && se.keywords.includes(k)) {
                        score += 5;
                    }
                });
                
                return { ...se, score, matchedReasons };
            });
            
            // 筛选和排序
            results = results.filter(se => se.score > 0)
                            .sort((a, b) => b.score - a.score)
                            .slice(0, 10);
            
            // 显示结果
            displayResults(results);
        }
        
        function displayResults(results) {
            const resultsSection = document.getElementById('results');
            const resultsList = document.getElementById('results-list');
            const resultsCount = document.getElementById('results-count');
            
            resultsSection.classList.remove('hidden');
            resultsCount.textContent = `${results.length} 間社企`;
            
            if (results.length === 0) {
                resultsList.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <p>沒有找到匹配的社企</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">請嘗試調整搜索條件</p>
                    </div>
                `;
                return;
            }
            
            resultsList.innerHTML = results.map(se => `
                <div class="result-card">
                    <div class="result-name">
                        ${se.name} <span>| ${se.nameEn}</span>
                        <span class="match-score">${se.score}% 匹配</span>
                    </div>
                    <div class="result-mission">🎯 ${se.mission}</div>
                    <div class="result-tags">
                        ${se.categories.map(c => `<span class="tag">${c}</span>`).join('')}
                    </div>
                    <div class="result-esg">
                        <div class="result-esg-title">💡 ESG/CSR 合作方案</div>
                        <ul>
                            ${se.esg.slice(0, 3).map(e => `<li>${e}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `).join('');
            
            // 滚动到结果区域
            resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
